<div class="chapter-list" [class.disabled] ="isEndExam">
  <div class="sidebar-section">
    <!-- Additional content for the sidebar -->
    <div class="question-number-list d-grid">
      <!-- List of questions will be rendered here -->
      @if (listQuestion.length > 0) {
        @for (
          question of listQuestion;
          track question.questionNumber;
          let idx = $index
        ) {
          <button
            type="button"
            id="cau{{ question.questionNumber }}"
            class="question-number"
            [ngClass]="question.state"
            style=""
            (click)="selectQuestion(question)"
          >
            {{ idx + 1 }}
          </button>
        }
      } @else {
        <span class="text-muted">Không có câu hỏi nào.</span>
      }
    </div>
  </div>
  <div class="sidebar-submit-wrapper">
    <button class="btn-action btn-submit" (click)="openDialog($event)">
      Nộp bài
    </button>
  </div>
</div>
