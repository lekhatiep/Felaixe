<div class="card quiz-card shadow">
  <!-- Header -->
  @if (currentQuestion) {
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">
        Câu {{ index + 1 }} / {{ listQuestion.length }}
      </span>
    </div>
    <!-- Body -->
    <div class="card-body">
      <!-- Question -->
      <h5 class="question-text">
        {{ currentQuestion.content }}
      </h5>
      <div class="question-image-wrapper">
        <app-question-image [questionId]="currentQuestion.questionNumber" />
      </div>


      <!-- Answers -->
      <div class="answer-list" [class.disabled] = "isEndExam">
      @for (ans of currentQuestion.answers; track ans.id; let i = $index) {
            <div
              class="answer-item answer"
              [class.answered]="selectedAnswerId === ans.id"
              (click)="submitAnswer(ans)"
            >
              <span class="">
                <!-- {{ans.id}} -- -- Ans ID: {{ selectedAnswerId}}  -->
                {{ i + 1 }}.
                {{ ans.content }}
              </span>
            </div>
          }
      </div>

      
    </div>
    <!-- Footer -->
    <div class="card-footer d-flex justify-content-between">
      <button
        mat-raised-button
        color="primary"
        class="btn btn-primary quiz-btn mt-4 pointer"
        [class.hide] = "hidePrevBtn"
        (click)="previous()"
      
      >
        <span class="next-text text-primary d-flex align-items-center gap-1">
          <mat-icon>arrow_back</mat-icon>
          <span> Câu trước</span>
        </span>
      </button>

      <button
        mat-raised-button
        color="primary"
        class="btn btn-primary quiz-btn mt-4 pointer"
        [class.hide] = "hideNextBtn"
        (click)="next()"
      >
        <span class="next-text text-primary d-flex align-items-center gap-1">
          <span>Câu tiếp</span>
          <mat-icon>arrow_forward</mat-icon>
        </span>
      </button>
    </div>
  } @else {
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold"> Không có nội dung câu hỏi </span>
    </div>
  }
</div>
