<div class="exam-history-section">
  <div class="history-header">
    <h3 class="history-title">
      <mat-icon>history</mat-icon>
      Lịch sử thi
    </h3>
    <button
      id="clearHistoryBtn"
      class="btn-clear-history"
      style="display: block"
      (click)="deleteHistoryExam()"
    >
       <mat-icon>delete</mat-icon>
      Xóa lịch sử
    </button>
  </div>
  <div class="history-list" id="historyList">
    @for(result of listResult; track $index) {
      <app-practice-history-item [resultItem]="result"></app-practice-history-item>
    }
  </div>
</div>
